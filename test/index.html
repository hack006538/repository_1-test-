<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ごっそり耳くそ掃除ゲーム - (ai生成です。testhtml)</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f7f3e9;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        h1 {
            color: #5d534a;
            margin: 10px 0 5px 0;
            font-size: 24px;
            z-index: 5;
        }
        #score-board {
            font-size: 18px;
            color: #7d6e61;
            margin-bottom: 10px;
            font-weight: bold;
            z-index: 5;
        }
        #game-container {
            position: relative;
            width: 400px;
            height: 500px;
            background-color: #ffd6b3; /* 耳の内部の肌色 */
            border: 8px solid #d9a073;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            cursor: none; /* デフォルトのカーソルを隠す */
        }
        /* 耳の穴のグラデーション表現 */
        #ear-hole {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 80%, #663311 0%, #cc8855 70%, #ffd6b3 100%);
            opacity: 0.8;
            pointer-events: none;
        }
        /* エフェクトを描画する背景キャンバス */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* クリックや移動を邪魔しない */
            z-index: 2;
        }
        /* 綿棒の見た目 */
        #swab {
            position: absolute;
            width: 24px;
            height: 250px;
            pointer-events: none;
            z-index: 10;
            transform: translate(-50%, -20px); /* 軸調整 */
        }
        /* 綿棒の綿の部分 */
        .swab-tip {
            width: 24px;
            height: 40px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.1);
        }
        /* 綿棒の持ち手（棒）の部分 */
        .swab-stick {
            width: 6px;
            height: 210px;
            background-color: #add8e6;
            margin: 0 auto;
        }
        /* 耳くそ */
        .earwax {
            position: absolute;
            background-color: #8b5a2b;
            border-radius: 50%;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.4), 0 2px 4px rgba(0,0,0,0.2);
            transition: transform 0.1s linear;
            z-index: 3;
        }
        /* カサブタのような大きめの耳くそ */
        .big-earwax {
            background-color: #5c3a21;
            border-radius: 40% 60% 50% 55%;
        }
        /* ゲームオーバー／クリア画面 */
        #result-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(93, 83, 74, 0.95);
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 12px;
        }
        #result-screen h2 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #ffd6b3;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            background-color: #ff9933;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover {
            background-color: #ffaa55;
            transform: scale(1.05);
        }
        .message {
            font-size: 14px;
            color: #a69382;
            margin-top: 10px;
            text-align: center;
            z-index: 5;
        }
    </style>
</head>
<body>

    <h1>✨ごっそり綿棒耳そうじ✨</h1>
    <div id="score-board">残り耳くそ: <span id="wax-count">0</span> 個</div>

    <div id="game-container">
        <div id="ear-hole"></div>
        <canvas id="effectCanvas"></canvas>
        <div id="swab">
            <div class="swab-tip"></div>
            <div class="swab-stick"></div>
        </div>
        <div id="result-screen">
            <h2>お耳スッキリ！</h2>
            <p style="font-size: 18px; margin-bottom: 30px;">すべての耳くそを掃除しました！</p>
            <button onclick="resetGame()">もう一度遊ぶ</button>
        </div>
    </div>

    <p class="message">【操作方法】マウスやタッチ操作で綿棒を動かして、耳くそに当てよう！</p>

    <script>
        const container = document.getElementById('game-container');
        const swab = document.getElementById('swab');
        const waxCountEl = document.getElementById('wax-count');
        const resultScreen = document.getElementById('result-screen');
        
        // Canvasの設定
        const canvas = document.getElementById('effectCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resizeCanvas();

        const TOTAL_WAX = 20; // 耳くその総数
        let activeWaxCount = TOTAL_WAX;
        let particles = [];

        // 粒子（パーティクル）クラス
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 3; // ゲーム用に少し速度調整
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.radius = Math.random() * 3 + 2;
                this.alpha = 1;
                this.decay = Math.random() * 0.02 + 0.02; // 少し早めに消えるよう調整
                // ゴールド〜オレンジ系の耳垢爽快カラー、またはレインボーから選択可能
                // 今回はご提示いただいた「鮮やかなレインボーカラー」を採用
                this.color = `hsl(${Math.random() * 360}, 100%, 65%)`;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.12; // 重力
                this.vx *= 0.96; // 空気抵抗
                this.vy *= 0.96;
                this.alpha -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        // 弾けるエフェクト発生関数
        function createBurst(x, y, count = 25) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y));
            }
        }

        // アニメーションループ
        function animate() {
            // 前のフレームをクリア（ゲーム画面なので完全に透明クリアにする）
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw();
                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        // 綿棒の移動処理
        function moveSwab(e) {
            const rect = container.getBoundingClientRect();
            let clientX, clientY;

            if (e.touches && e.touches[0]) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            const x = clientX - rect.left;
            const y = clientY - rect.top;

            if (x >= 0 && x <= rect.width && y >= 0 && y <= rect.height) {
                swab.style.left = `${x}px`;
                swab.style.top = `${y}px`;
                checkCollision(x, y);
            }
        }

        container.addEventListener('mousemove', moveSwab);
        container.addEventListener('touchmove', function(e) {
            e.preventDefault();
            moveSwab(e);
        }, { passive: false });

        // 耳くその生成
        function createEarwax() {
            const existingWax = document.querySelectorAll('.earwax');
            existingWax.forEach(w => w.remove());

            for (let i = 0; i < TOTAL_WAX; i++) {
                const wax = document.createElement('div');
                wax.classList.add('earwax');

                const isBig = Math.random() < 0.2;
                let size = Math.floor(Math.random() * 15) + 15;
                
                if (isBig) {
                    wax.classList.add('big-earwax');
                    size = Math.floor(Math.random() * 15) + 35;
                    wax.dataset.hp = 3; 
                } else {
                    wax.dataset.hp = 1;
                }

                wax.style.width = `${size}px`;
                wax.style.height = `${size}px`;

                const left = Math.random() * 320 + 40;
                const top = Math.random() * 300 + 100;

                wax.style.left = `${left}px`;
                wax.style.top = `${top}px`;

                container.appendChild(wax);
            }
        }

        // 当たり判定
        function checkCollision(swabX, swabY) {
            const waxes = document.querySelectorAll('.earwax');
            const tipRadius = 12; // 綿棒の先端の判定半径

            waxes.forEach(wax => {
                // 耳くその中心座標と半径を算出
                const waxWidth = parseFloat(wax.style.width);
                const waxX = parseFloat(wax.style.left) + waxWidth / 2;
                const waxY = parseFloat(wax.style.top) + waxWidth / 2;
                const waxRadius = waxWidth / 2;

                // 綿棒の中心と耳くその中心の距離を計算
                const dist = Math.hypot(swabX - waxX, swabY - waxY);

                // 接触している場合の処理
                if (dist < tipRadius + waxRadius) {
                    let hp = parseInt(wax.dataset.hp);
                    
                    if (hp > 1) {
                        // 大きい耳くそが削れるとき（火花のような小爆発）
                        wax.dataset.hp = hp - 1;
                        wax.style.transform = `scale(${0.7 * hp})`;
                        createBurst(waxX, waxY, 10); // 10個の粒子を発生
                        
                        // 連続ヒットを防ぎ、削れた手応えを出すために位置をわずかにずらす
                        wax.style.left = `${parseFloat(wax.style.left) + (Math.random() * 14 - 7)}px`;
                        wax.style.top = `${parseFloat(wax.style.top) + (Math.random() * 14 - 7)}px`;
                    } else {
                        // 耳くそが完全に消滅するとき（大爆発エフェクト）
                        createBurst(waxX, waxY, 35); // 35個の粒子を発生
                        wax.remove();
                        updateCount();
                    }
                }
            });
        }

        // 残り耳くそ数の更新とクリア判定
        function updateCount() {
            const currentWaxes = document.querySelectorAll('.earwax').length;
            waxCountEl.innerText = currentWaxes;

            // 全て消えたらクリア画面を表示
            if (currentWaxes === 0) {
                resultScreen.style.display = 'flex';
            }
        }

        // ゲームのリセット・初期化処理
        function resetGame() {
            resultScreen.style.display = 'none';
            particles = []; // 残っているエフェクトをクリア
            waxCountEl.innerText = TOTAL_WAX;
            createEarwax(); // 新しく耳くそを配置
        }

        // ゲームの初回自動スタート
        resetGame();
    </script>
</body>
</html>
